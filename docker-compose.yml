services:
  api:
    build: .
    ports:
      - "3000:8080"
    environment:
      RAILS_ENV: production
      # Unprivileged port so the image also runs on rootless Docker/Podman
      # (Puma listens on 3000 inside the container; Thruster proxies it)
      HTTP_PORT: 8080
      # Demo-only secret so the app boots without config/master.key.
      # Generate your own for anything beyond local evaluation.
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-7f9c2ba4e88f827d616045507605853ed73b8093f6efbc88eb1a6eacfa66ef26}
      GEOLOCATION_PROVIDER: ${GEOLOCATION_PROVIDER:-fake}
      IPSTACK_API_KEY: ${IPSTACK_API_KEY:-}
      API_TOKEN: ${API_TOKEN:-secret-demo-token}
    volumes:
      - storage:/rails/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  storage:
